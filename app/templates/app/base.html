<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Screener</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* 🔥 NAVBAR */
        .navbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            margin: 10px;
        }

        .navbar a {
            color: white !important;
            font-weight: 500;
        }

        .navbar a:hover {
            color: #00eaff !important;
        }

        /* 🔥 CARD */
        .card {
            border-radius: 20px;
            transition: 0.3s;
            background: rgba(255,255,255,0.95);
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        /* 🔥 BUTTON */
        .btn-primary {
            background: linear-gradient(45deg, #007bff, #00c6ff);
            border: none;
            border-radius: 30px;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        /* 🔥 BADGES */
        .badge {
            border-radius: 20px;
            padding: 6px 12px;
        }

        /* 🔥 TABLE */
        .table {
            border-radius: 10px;
            overflow: hidden;
        }

        .table th {
            background: #343a40;
            color: white;
        }

        /* 🔥 STATUS COLORS */
        .status-high { background: #28a745; color: white; }
        .status-mid { background: #ffc107; color: black; }
        .status-low { background: #dc3545; color: white; }

    </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg px-4">
    <h5 class="text-white">🤖 AI Resume Screener</h5>

    <div class="ms-auto">
        <a href="/" class="me-3"><i class="fa fa-home"></i> Home</a>
        <a href="/jobs/" class="me-3"><i class="fa fa-briefcase"></i> Jobs</a>
        <a href="/create-job/" class="me-3"><i class="fa fa-plus"></i> Create</a>
        <a href="/analytics/" class="me-3"><i class="fa fa-chart-bar"></i> Analytics</a>
         {% if user.is_authenticated %}
        <form action="/logout/" method="post" style="display:inline;">
    {% csrf_token %}
    <button class="btn btn-sm btn-danger">Logout</button>
</form>
    {% else %}
        <a href="/login/" class="btn btn-sm btn-primary">Login</a>
    {% endif %}

    </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
