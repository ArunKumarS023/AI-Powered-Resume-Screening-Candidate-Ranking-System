{% extends 'app/base.html' %}

{% block content %}

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card p-4 shadow text-center">

                <h3 class="mb-3">📄 Upload Resumes</h3>

                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <!-- 📂 MULTIPLE FILE UPLOAD -->
                    <div class="border rounded p-4 mb-3 bg-light">

                        <p class="mb-2 fw-bold">📂 Upload Multiple Resumes</p>
                        <small class="text-muted">Supported: PDF only</small>

                        <!-- 🔥 IMPORTANT CHANGE -->
                        <input type="file" name="files" class="form-control mt-2" multiple accept=".pdf" required>

                    </div>

                    <!-- 🚀 BUTTON -->
                    <button type="submit" class="btn btn-primary w-100">
                        🚀 Upload & Analyze
                    </button>

                </form>
                <div id="loading" class="text-center mt-3" style="display:none;">
    <div class="spinner-border text-primary"></div>
    <p>Processing resumes... Please wait</p>
</div>

                <!-- 🔙 BACK -->
                <a href="/jobs/" class="btn btn-secondary mt-3 w-100">
                    ← Back to Jobs
                </a>

            </div>

        </div>

    </div>
</div>
<script>
document.querySelector("form").addEventListener("submit", function() {
    document.getElementById("loading").style.display = "block";
});
</script>
{% endblock %}
